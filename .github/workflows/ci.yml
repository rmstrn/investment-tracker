name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"
  GO_VERSION: "1.26"
  PYTHON_VERSION: "3.13"
  UV_VERSION: "0.5.11"

jobs:
  # ------------------------------------------------------------
  # Node / TypeScript
  # ------------------------------------------------------------
  node-lint-typecheck:
    name: Node — lint + typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm exec biome ci .

      - name: Lint (workspace scripts)
        run: pnpm -r --filter="!./apps/api" --filter="!./apps/ai" --if-present run lint

      - name: Typecheck
        run: pnpm -r --filter="!./apps/api" --filter="!./apps/ai" --if-present run typecheck

      - name: Build
        run: pnpm -r --filter="!./apps/api" --filter="!./apps/ai" --if-present run build

  node-test:
    name: Node — unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm -r --filter="!./apps/api" --filter="!./apps/ai" --if-present run test

  # ------------------------------------------------------------
  # Go — apps/api
  # ------------------------------------------------------------
  go:
    name: Go — lint + vet + build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/api/go.sum

      - name: Tidy check (no unexpected module changes)
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          working-directory: apps/api
          args: --timeout=5m

      - name: Vet
        run: go vet ./...

      - name: Build
        run: |
          mkdir -p bin
          go build -trimpath -o bin/api     ./cmd/api
          go build -trimpath -o bin/workers ./cmd/workers

      - name: Test
        run: go test -race -count=1 ./...

  # ------------------------------------------------------------
  # Python — apps/ai
  # ------------------------------------------------------------
  python:
    name: Python — lint + typecheck + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ai
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "apps/ai/uv.lock"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Sync dependencies
        run: uv sync --dev

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Format check (ruff)
        run: uv run ruff format --check src tests

      - name: Typecheck (mypy)
        run: uv run mypy src

      - name: Test (pytest)
        run: uv run pytest

  # ------------------------------------------------------------
  # AI Service Docker build gate (TD-R086)
  # ------------------------------------------------------------
  # deploy-ai.yml is workflow_dispatch-only, so the AI Service
  # Dockerfile never gets verified on a PR before a manual deploy.
  # TD-087 + TD-085 were both latent Dockerfile bugs caught only
  # during PO's first `flyctl deploy` — this job catches that
  # class of bug pre-merge. Runs in parallel with the Python
  # lint+test job; no `needs:` so a green PR Docker build does
  # not block host-Python diagnostics.
  docker-build-ai:
    name: AI — Docker build + smoke import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Build apps/ai Dockerfile
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/ai/Dockerfile
          target: runtime
          push: false
          load: true
          tags: ai-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke import inside runtime image
        # Proves the built image can `import ai_service.main` — the
        # exact TD-087 failure mode (multi-stage venv without
        # --no-editable shipped a .pth file pointing at a missing
        # /src path). Also a cheap guard against future
        # dockerignore typos (TD-085) — if pyproject.toml or
        # README.md is missing from the runtime layer, Hatchling
        # fails at import.
        run: |
          docker run --rm --entrypoint python ai-service:ci \
            -c "import ai_service.main; print('import OK')"

  # NOTE: No matching Core API Docker-build job here — apps/api is
  # already built + deployed on every push to main via
  # .github/workflows/deploy-api.yml (the `flyctl deploy` step in
  # Deploy — staging), so Dockerfile regressions surface there
  # without a separate CI job. If a future PR-gated check is
  # desired, the pattern above clones cleanly.

  # ------------------------------------------------------------
  # Cross-service contract checks
  # ------------------------------------------------------------
  contract-header-symmetry:
    name: Contract — shared HTTP header symmetry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check Go ↔ Python shared header constants
        # Parses apps/api/internal/httpheader/httpheader.go and
        # apps/ai/src/ai_service/http_headers.py and asserts the
        # cross-service subset (UserID, RequestID, Authorization)
        # has identical string values on both sides. Edits to one
        # file without the matching edit on the other side fail
        # this step. Sprint C 3a; no deps, stdlib only.
        run: python tools/scripts/check-header-symmetry.py

  # ------------------------------------------------------------
  # Security
  # ------------------------------------------------------------
  security-secrets:
    name: Security — secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-trivy:
    name: Security — filesystem scan (trivy)
    runs-on: ubuntu-latest
    # security-events:write is required by github/codeql-action/upload-sarif.
    # Without it the upload step fails with "Resource not accessible by
    # integration", which has been marking the whole CI run red on every
    # push since the trivy job was added. contents:read is the default
    # read-only token required by actions/checkout.
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0" # Don't fail the build on findings; upload to security tab
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  security-govulncheck:
    name: Security — govulncheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
