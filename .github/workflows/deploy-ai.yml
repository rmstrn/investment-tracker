name: Deploy — ai (Fly.io)

# Disabled until FLY_API_TOKEN is set. Flip to `push: [main]` once the app is
# provisioned and the secret is in the repo.
on:
  workflow_dispatch:

concurrency:
  group: deploy-ai
  cancel-in-progress: false

jobs:
  deploy:
    name: fly deploy — ai
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      # TODO: set FLY_API_TOKEN in repo secrets (see README).
      - name: Deploy ai
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config apps/ai/fly.toml \
            --dockerfile apps/ai/Dockerfile \
            --remote-only
