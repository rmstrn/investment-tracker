name: Deploy — api (Fly.io)

# Stages: staging → k6 smoke → manual approve (production environment) →
# prod → k6 smoke (non-blocking) → tag release.
#
# Secrets are NOT synced here — `doppler-sync.yml` owns that path and is
# fired manually when secret values change. This workflow assumes the
# fly apps already hold a valid secret set (checked by
# ops/scripts/verify-prod-secrets.sh before each deploy).
#
# Prerequisites PO must set up before the first run:
#   - GitHub Environments `staging` + `production` configured, with
#     `production` requiring 1 reviewer.
#   - Repo secrets: FLY_API_TOKEN, STAGING_TEST_USER_TOKEN,
#     PROD_TEST_USER_TOKEN.
#   - Fly apps `investment-tracker-api` + `investment-tracker-api-staging`
#     created.
#   - DNS for api-staging + api pointed at Fly after the first successful
#     deploy of each.
#
# Workers deploy was removed defensively — the cmd/workers binary is a
# placeholder heartbeat with no asynq consumer. PR D restores the
# workers target once a real consumer lands. See TD-066.

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/deploy-api.yml'
      - 'tools/k6/**'
  workflow_dispatch:
    inputs:
      skip_staging_smoke:
        description: "Skip the staging smoke gate (emergency hotfix only)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-staging-secrets:
    name: Verify staging secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Diff Fly secrets against ops/secrets.keys.yaml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: investment-tracker-api-staging
        run: bash ops/scripts/verify-prod-secrets.sh

  deploy-staging:
    name: Deploy — staging
    needs: verify-staging-secrets
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://api-staging.investment-tracker.app
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: flyctl deploy → staging
        working-directory: apps/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config fly.staging.toml \
            --dockerfile Dockerfile \
            --build-target api \
            --remote-only \
            --wait-timeout 600

  smoke-staging:
    name: k6 smoke — staging
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_staging_smoke != 'true' }}
    steps:
      - uses: actions/checkout@v6
      - uses: grafana/setup-k6-action@v1
      - name: Run smoke suite
        env:
          BASE_URL: https://api-staging.investment-tracker.app
          TEST_USER_TOKEN: ${{ secrets.STAGING_TEST_USER_TOKEN }}
        run: bash tools/k6/run-smoke.sh

  verify-prod-secrets:
    name: Verify prod secrets
    needs: smoke-staging
    if: ${{ always() && needs.deploy-staging.result == 'success' && (needs.smoke-staging.result == 'success' || needs.smoke-staging.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Diff Fly secrets against ops/secrets.keys.yaml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: investment-tracker-api
        run: bash ops/scripts/verify-prod-secrets.sh

  deploy-prod:
    name: Deploy — prod (requires approval)
    needs: verify-prod-secrets
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.investment-tracker.app
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: flyctl deploy → prod
        working-directory: apps/api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config fly.toml \
            --dockerfile Dockerfile \
            --build-target api \
            --remote-only \
            --wait-timeout 600

  smoke-prod:
    name: k6 smoke — prod (non-blocking)
    needs: deploy-prod
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: grafana/setup-k6-action@v1
      - name: Run smoke suite
        env:
          BASE_URL: https://api.investment-tracker.app
          TEST_USER_TOKEN: ${{ secrets.PROD_TEST_USER_TOKEN }}
        run: bash tools/k6/run-smoke.sh

  tag-release:
    name: Tag release
    needs: deploy-prod
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Tag v0.0.${{ github.run_number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="api-v0.0.${{ github.run_number }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --generate-notes --title "API deploy $TAG"
