# Fly.io deployment config — AI Service (staging).
# Deploy:  flyctl deploy --config apps/ai/fly.staging.toml --dockerfile apps/ai/Dockerfile
#
# Staging mirrors prod's runtime shape (region, TLS, healthcheck, VM size) so a smoke
# failure here predicts a prod failure. What staging does differently:
#
#   - app name             investment-tracker-ai-staging (prod: investment-tracker-ai)
#   - ENVIRONMENT          "staging" (prod: "production")
#   - LOG_LEVEL            "INFO" present explicitly (prod inherits config.py default)
#   - min_machines_running 1 — no cold-start hit during UI smoke / demo flows
#                              (prod keeps 0; AI traffic bursty, scale-to-zero OK there)
#
# Anthropic model IDs are pinned here (not in Doppler) — explicit in diff, never
# silently drifted by config.py default changes, and Fly secrets would otherwise
# silently override the pin.
#
# Bridge invariant: INTERNAL_API_TOKEN here MUST equal AI_SERVICE_TOKEN in the
# Core API staging Doppler (project investment-tracker-api, config stg). Parity
# is guarded manually until TD-082 lands an automated drift check.

app = "investment-tracker-ai-staging"
primary_region = "fra"

kill_signal = "SIGTERM"
kill_timeout = 30

[build]
  dockerfile = "Dockerfile"

[env]
  AI_LISTEN_HOST = "0.0.0.0"
  AI_LISTEN_PORT = "8000"
  ENVIRONMENT = "staging"
  LOG_LEVEL = "INFO"
  ANTHROPIC_MODEL_SONNET = "claude-sonnet-4-6"
  ANTHROPIC_MODEL_HAIKU = "claude-haiku-4-5-20251001"
  ANTHROPIC_MODEL_OPUS = "claude-opus-4-6"

[http_service]
  internal_port = 8000
  force_https = true
  # Staging traffic — bursty (UI smoke + PO manual tests), suspend saves $.
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 80

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
