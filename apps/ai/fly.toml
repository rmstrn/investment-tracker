# Fly.io deployment config — AI service.

app = "investment-tracker-ai"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  AI_LISTEN_HOST = "0.0.0.0"
  AI_LISTEN_PORT = "8000"
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0    # AI calls are bursty — fine to scale to zero

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 80

  [[http_service.checks]]
    grace_period = "15s"
    interval = "30s"
    method = "GET"
    path = "/healthz"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
