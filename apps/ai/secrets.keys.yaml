# Secret manifest — source of truth for the key set each AI Service Fly app
# must carry. Values live in Doppler (project `investment-tracker-ai`,
# configs dev / stg / prd). This file is intentionally value-less so it
# can be committed and diffed.
#
# Consumers:
#   - ops/scripts/verify-ai-secrets.sh runs before every deploy and
#     fails CI if any `required` key is missing on the target Fly app.
#     The shim exports KEYS_FILE=<this file> and exec's verify-prod-secrets.sh.
#   - docs/RUNBOOK_ai_staging_deploy.md references this list under § 4.
#
# When adding a new required secret:
#   1. Add an entry here.
#   2. Add the key + value to Doppler (dev/stg/prd).
#   3. Sync Doppler → Fly (see runbook § 4.3; automated path deferred to TD-069).
#   4. Next deploy's verify step asserts the new invariant.
#
# NOT in this manifest (intentional):
#   - ANTHROPIC_MODEL_SONNET / HAIKU / OPUS — pinned in fly.staging.toml [env]
#     block; explicit in diff, never silently overridden by Fly secrets.
#   - ENCRYPTION_KEK — AI Service is a pure Anthropic proxy; no envelope
#     encryption on this side (Core API holds the KEK).

required:
  # ── Incoming auth (Core API → AI Service) ──────────────────────
  - name: INTERNAL_API_TOKEN
    purpose: Bearer Core API uses to authenticate its calls into AI Service. MUST equal AI_SERVICE_TOKEN in Core API staging Doppler (bridge invariant — TD-082 will automate drift check).

  # ── Anthropic ──────────────────────────────────────────────────
  - name: ANTHROPIC_API_KEY
    purpose: Anthropic SDK key. Shared with dev/prod on staging (low traffic); rotate to staging-specific if abuse/cost pattern emerges.

  # ── Outgoing: Core API (AI Service → Core) ─────────────────────
  - name: CORE_API_URL
    purpose: Base URL AI Service calls back into Core (tool-use, user-context fetches). Staging value = https://api-staging.investment-tracker.app
  - name: CORE_API_INTERNAL_TOKEN
    purpose: AI Service → Core reverse-channel bearer. Must match the same-named key in Core API staging Doppler (shared internal token, both sides speak it).

# `optional` keys are documented for runbook completeness but are not
# asserted by verify-ai-secrets.sh. Missing values degrade specific
# features gracefully (observability off, default tuning) rather than
# preventing boot.
optional:
  - name: SENTRY_DSN
    purpose: Error tracking. Optional on staging; recommended on prod.
  - name: SENTRY_TRACES_SAMPLE_RATE
    purpose: Sentry APM sample rate (0.0-1.0). config.py default = 0.1.
  - name: POSTHOG_API_KEY
    purpose: Product analytics key. Optional on staging.
  - name: POSTHOG_HOST
    purpose: PostHog ingest URL. config.py default = https://us.i.posthog.com.
  - name: ANTHROPIC_MAX_CONCURRENT
    purpose: Process-local semaphore cap on concurrent Claude requests. config.py default = 10.
  - name: ANTHROPIC_TIMEOUT_SECONDS
    purpose: Anthropic request timeout. config.py default = 60.0.
  - name: ANTHROPIC_MAX_RETRIES
    purpose: Anthropic retry count. config.py default = 2.
  - name: CORE_API_TIMEOUT_SECONDS
    purpose: Timeout for outbound calls AI Service → Core. config.py default = 30.0.
