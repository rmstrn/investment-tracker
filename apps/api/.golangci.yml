# golangci-lint config for apps/api
# Run: `cd apps/api && golangci-lint run ./...`
# Or from root: `pnpm lint` (via turbo → api workspace)

version: "2"

run:
  timeout: 3m
  go: "1.25"
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - gosec
    - misspell
    - unparam
    - bodyclose
    - noctx
    - rowserrcheck
    - sqlclosecheck
  settings:
    gosec:
      excludes:
        - G404 # weak RNG — fine for non-crypto uses
    revive:
      rules:
        - name: exported
          disabled: true # too noisy for internal/*
  exclusions:
    paths:
      - internal/db/sqlc # generated code
      - internal/mocks
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/rmstrn/investment-tracker
