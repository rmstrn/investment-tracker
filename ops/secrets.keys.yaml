# Secret manifest — source of truth for the key set each Core API Fly app
# must carry. Values live in Doppler (project `investment-tracker-api`,
# configs dev / stg / prd). This file is intentionally value-less so it
# can be committed and diffed.
#
# Consumers:
#   - ops/scripts/verify-prod-secrets.sh runs before every deploy and
#     fails CI if any `required` key is missing on the target Fly app.
#   - docs/RUNBOOK_deploy.md references this list under § Secrets.
#
# When adding a new required secret:
#   1. Add an entry here.
#   2. Add the key + value to Doppler (dev/stg/prd).
#   3. `doppler-sync.yml` (manual dispatch) pipes Doppler → Fly.
#   4. Next deploy's verify step asserts the new invariant.

required:
  # ── Data stores ────────────────────────────────────────────────
  - name: DATABASE_URL
    purpose: Neon Postgres DSN (prod/stg projects separate)
  - name: REDIS_URL
    purpose: Upstash Redis DSN

  # ── Auth (Clerk) ───────────────────────────────────────────────
  - name: CLERK_SECRET_KEY
    purpose: Clerk server-side API access
  - name: CLERK_JWKS_URL
    purpose: JWKS endpoint for JWT verification
  - name: CLERK_WEBHOOK_SECRET
    purpose: svix signing secret for Clerk webhooks

  # ── Billing (Stripe) ───────────────────────────────────────────
  - name: STRIPE_SECRET_KEY
    purpose: Stripe API access (sk_live_* in prod)
  - name: STRIPE_WEBHOOK_SECRET
    purpose: Stripe webhook signature verification (whsec_*)

  # ── AI service ─────────────────────────────────────────────────
  - name: AI_SERVICE_URL
    purpose: Core → AI Service base URL (Fly 6PN in prod)
  - name: AI_SERVICE_TOKEN
    purpose: Core → AI Service bearer (chat, insights, tool calls)
  - name: CORE_API_INTERNAL_TOKEN
    purpose: AI Service → Core reverse-channel bearer (and future workers)

  # ── Encryption ─────────────────────────────────────────────────
  - name: ENCRYPTION_KEK
    purpose: AES-256 KEK (base64) for envelope-encrypting broker creds

  # ── External data / providers ──────────────────────────────────
  - name: POLYGON_API_KEY
    purpose: Market data (stocks + ETFs)
  - name: SNAPTRADE_CLIENT_ID
    purpose: Broker aggregation client id
  - name: SNAPTRADE_CONSUMER_KEY
    purpose: Broker aggregation consumer key

  # ── Observability ──────────────────────────────────────────────
  - name: SENTRY_DSN
    purpose: Error tracking (optional in config.go; required in prod)

  # ── Web / CORS ─────────────────────────────────────────────────
  - name: ALLOWED_ORIGINS
    purpose: CORS allowlist — CSV of exact origins (scheme+host, no trailing slash); wildcards rejected (credentials mode)

# `optional` keys are documented for runbook completeness but are not
# asserted by verify-prod-secrets.sh. Missing values degrade specific
# features gracefully rather than preventing boot.
optional:
  - name: STRIPE_PRICE_PLUS
    purpose: price_id → "plus" tier mapping; empty until prod catalog lands (TD-057)
  - name: STRIPE_PRICE_PRO
    purpose: price_id → "pro" tier mapping; empty until prod catalog lands (TD-057)
  - name: COINGECKO_API_KEY
    purpose: Free tier works without; upgrade as traffic grows
