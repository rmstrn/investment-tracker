openapi: 3.1.0

info:
  title: Investment Tracker API
  version: 0.1.0
  summary: AI-native portfolio tracker REST API
  description: |
    Read-only aggregator for investment portfolios with an AI-first UX.

    ## Design principles

    - **Spec-first.** This file is the source of truth. Go (huma v2), TypeScript
      (openapi-typescript / openapi-fetch) and Swift (swift-openapi-generator)
      artefacts are generated from this document.
    - **All paths under `/v1/`.** Breaking changes go to `/v2/`.
    - **Cursor pagination** everywhere a list is returned.
    - **Standard error envelope** with a stable `code` and a `request_id`.
    - **Rate limits** are communicated via `X-RateLimit-*` headers on every
      response; `429` is returned when exceeded.
    - **Idempotency.** All mutating endpoints (`POST`, `PATCH`, `DELETE`) accept
      an optional `Idempotency-Key` header. The server stores the response for
      24 hours and replays it for a repeated key.
    - **Money is a string.** Decimal strings (e.g. `"123.4567890000"`) preserve
      precision; JSON numbers would not.
    - **Multi-currency.** Values are always returned in both `base` (USD today)
      and `display` (user preference, converted on the fly).
    - **SSE streaming.** `POST /v1/ai/chat/stream` uses `text/event-stream`.
      A non-stream `POST /v1/ai/chat` counterpart exists for tests and
      retrospectives.
  contact:
    name: Investment Tracker Team
    email: dev@investmenttracker.example
  license:
    name: Proprietary
    url: https://investmenttracker.example/license

servers:
  - url: http://localhost:8080/v1
    description: Local dev (docker-compose)
  - url: https://api-staging.investmenttracker.example/v1
    description: Staging
  - url: https://api.investmenttracker.example/v1
    description: Production

tags:
  - name: System
    description: Health checks and metadata
  - name: Users
    description: Authenticated user profile, usage, GDPR
  - name: Accounts
    description: Connected broker / exchange accounts
  - name: Transactions
    description: Immutable ledger of trades and events
  - name: Positions
    description: Computed current holdings
  - name: Portfolio
    description: Aggregated portfolio views
  - name: Market
    description: Market data proxy
  - name: AI
    description: AI chat, conversation history and proactive insights
  - name: Billing
    description: Subscription and Stripe integration
  - name: Notifications
    description: In-app notification center and delivery preferences
  - name: Webhooks
    description: Inbound webhooks from Clerk and Stripe

security:
  - bearerAuth: []

paths:
  # ─────────────────────────── System ────────────────────────────
  /health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'

  # ─────────────────────────── Users ─────────────────────────────
  /me:
    get:
      tags: [Users]
      operationId: getMe
      summary: Get the current user
      responses:
        '200':
          description: Current user
          headers:
            X-RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
            X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
            X-RateLimit-Reset: { $ref: '#/components/headers/RateLimitReset' }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [Users]
      operationId: updateMe
      summary: Update the current user's profile
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserUpdateRequest' }
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    delete:
      tags: [Users]
      operationId: deleteMe
      summary: Delete the current user and all associated data (GDPR)
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: |
            Deletion accepted. Hard delete is scheduled as an async job;
            from the API's perspective the account is immediately inaccessible.
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/export:
    get:
      tags: [Users]
      operationId: exportMe
      summary: GDPR data export
      description: |
        Returns a JSON bundle of every piece of personal data held for the
        current user. Suitable for download by the user via the app.
      responses:
        '200':
          description: Data export bundle
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserExportBundle' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/usage:
    get:
      tags: [Users]
      operationId: getMyUsage
      summary: Current tier limits and consumption
      responses:
        '200':
          description: Usage summary
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UsageSummary' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/paywalls:
    get:
      tags: [Users]
      operationId: listMyPaywallDismissals
      summary: List soft-paywall dismissals active for the current 24h window
      description: |
        Returns the paywall triggers the caller has dismissed today. The
        client uses this to avoid re-showing the same soft-paywall modal
        more than once per day (see design brief §13.4). Dismissals are
        bucketed by local day and expire at UTC midnight.
      responses:
        '200':
          description: Active dismissals
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaywallDismissalList' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/paywalls/{trigger}/dismiss:
    parameters:
      - $ref: '#/components/parameters/PaywallTrigger'
    post:
      tags: [Users]
      operationId: dismissPaywall
      summary: Record a soft-paywall dismissal for the current day
      description: |
        Idempotent per (user, trigger, day) — repeated calls within the
        same UTC day are no-ops and return 200. Stored on the shared
        `usage_counters` table with `counter_type='paywall_dismissed_{trigger}'`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Dismissal recorded (or already recorded earlier today)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PaywallDismissal' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/undo-deletion:
    post:
      tags: [Users]
      operationId: undoDeletion
      summary: Cancel a pending account deletion (within grace period)
      description: |
        Clears `deletion_scheduled_at`. Only succeeds while the user is
        within the 7-day grace window (see §17.4). After the window expires
        the hard-delete job runs and this endpoint returns `410 GONE`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Deletion cancelled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: Account was not pending deletion
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '410':
          description: Grace period expired — deletion already processed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ───────────────────────── Security (Clerk-proxied) ────────────
  # All 2FA + session endpoints proxy to Clerk Management API. Clerk is the
  # source of truth — we store no local MFA secret or session row. The
  # endpoints exist so the web/iOS app has a stable surface independent of
  # Clerk SDK changes.
  /me/2fa:
    get:
      tags: [Users]
      operationId: get2FAStatus
      summary: Get 2FA enrolment status (proxied to Clerk)
      responses:
        '200':
          description: Status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TwoFactorStatus' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/2fa/enroll:
    post:
      tags: [Users]
      operationId: enroll2FA
      summary: Start TOTP enrolment (proxied to Clerk)
      description: |
        Returns the TOTP shared secret, an `otpauth://` URL (for QR code
        rendering) and a preview of backup codes. Enrolment completes only
        after `POST /me/2fa/verify` with a valid 6-digit code.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Enrolment payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TwoFactorEnrollment' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: 2FA already enabled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /me/2fa/verify:
    post:
      tags: [Users]
      operationId: verify2FA
      summary: Verify the TOTP code and finalise enrolment
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TwoFactorVerifyRequest' }
      responses:
        '200':
          description: 2FA enabled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TwoFactorStatus' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/2fa/disable:
    post:
      tags: [Users]
      operationId: disable2FA
      summary: Disable 2FA (requires current code)
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TwoFactorVerifyRequest' }
      responses:
        '200':
          description: 2FA disabled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TwoFactorStatus' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/2fa/backup-codes/regenerate:
    post:
      tags: [Users]
      operationId: regenerate2FABackupCodes
      summary: Regenerate backup codes (invalidates previous set)
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: New backup codes
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TwoFactorBackupCodes' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: 2FA is not enabled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /me/sessions:
    get:
      tags: [Users]
      operationId: listMySessions
      summary: List active Clerk sessions
      responses:
        '200':
          description: Sessions
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/UserSession' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me/sessions/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, description: 'Clerk session id.' }
    delete:
      tags: [Users]
      operationId: revokeMySession
      summary: Revoke a single session
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204': { description: Revoked }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /me/sessions/others:
    delete:
      tags: [Users]
      operationId: revokeOtherSessions
      summary: Revoke every session except the current one
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Bulk revoke result
          content:
            application/json:
              schema:
                type: object
                required: [revoked_count]
                properties:
                  revoked_count: { type: integer, minimum: 0 }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ─────────────────────────── Accounts ──────────────────────────
  /accounts:
    get:
      tags: [Accounts]
      operationId: listAccounts
      summary: List connected accounts
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated list of accounts
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Account' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Accounts]
      operationId: createAccount
      summary: Start account connection
      description: |
        For `aggregator` connections (SnapTrade / Plaid) this returns a
        `connect_url` the client should open. The account row is created in
        `pending` state and transitions to `ok` after the first sync.

        For `manual` accounts the row is created immediately in state `ok` and
        `connect_url` is `null`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AccountCreateRequest' }
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccountCreateResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }

  /accounts/{id}:
    parameters:
      - $ref: '#/components/parameters/AccountId'
    get:
      tags: [Accounts]
      operationId: getAccount
      summary: Get a single account
      responses:
        '200':
          description: Account details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Account' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Accounts]
      operationId: updateAccount
      summary: Update an account (display name only for now)
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AccountUpdateRequest' }
      responses:
        '200':
          description: Updated account
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Account' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Accounts]
      operationId: deleteAccount
      summary: Soft-delete (disconnect) an account
      description: |
        Sets `deleted_at`. Historical transactions remain for accurate snapshot
        reconstruction, but the account no longer appears in active listings,
        syncs or aggregations.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Account disconnected
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /accounts/{id}/sync:
    parameters:
      - $ref: '#/components/parameters/AccountId'
    post:
      tags: [Accounts]
      operationId: syncAccount
      summary: Trigger a manual sync
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '202':
          description: Sync queued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccountSyncStatus' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /accounts/{id}/status:
    parameters:
      - $ref: '#/components/parameters/AccountId'
    get:
      tags: [Accounts]
      operationId: getAccountStatus
      summary: Get last sync status
      responses:
        '200':
          description: Sync status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccountSyncStatus' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /accounts/{id}/reconnect:
    parameters:
      - $ref: '#/components/parameters/AccountId'
    post:
      tags: [Accounts]
      operationId: reconnectAccount
      summary: Re-authenticate an aggregator-backed account
      description: |
        Produces a fresh aggregator connect URL (OAuth flow) or re-opens the
        API-key input for the account. Used when `sync_status=error` due to
        expired auth / rotated API key (design brief §18.4).

        For `connection_type=manual` accounts this returns `connect_url=null`
        and the endpoint is a no-op (`200`).
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                redirect_url:
                  type: string
                  format: uri
                  description: Where to return the user after OAuth.
      responses:
        '200':
          description: Reconnection flow started
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccountReconnectResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /accounts/{id}/pause:
    parameters:
      - $ref: '#/components/parameters/AccountId'
    post:
      tags: [Accounts]
      operationId: pauseAccount
      summary: Pause automatic sync for this account
      description: |
        Transitions `sync_status` → `paused`. The scheduled sync worker
        skips paused accounts until `POST /accounts/{id}/resume` is called.
        Manual `POST /accounts/{id}/sync` is still permitted while paused.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Paused
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Account' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /accounts/{id}/resume:
    parameters:
      - $ref: '#/components/parameters/AccountId'
    post:
      tags: [Accounts]
      operationId: resumeAccount
      summary: Resume automatic sync for this account
      description: |
        Transitions `sync_status` from `paused` → `pending`. Next scheduled
        run will pick the account up.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Resumed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Account' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ──────────────────────── Transactions ─────────────────────────
  /transactions:
    get:
      tags: [Transactions]
      operationId: listTransactions
      summary: List transactions
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: account_id
          in: query
          schema: { type: string, format: uuid }
        - name: symbol
          in: query
          schema: { type: string }
        - name: asset_type
          in: query
          schema: { $ref: '#/components/schemas/AssetType' }
        - name: transaction_type
          in: query
          schema: { $ref: '#/components/schemas/TransactionType' }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
      responses:
        '200':
          description: Paginated list of transactions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Transaction' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Transactions]
      operationId: createTransaction
      summary: Manually add a transaction
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransactionCreateRequest' }
      responses:
        '201':
          description: Transaction created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Transaction' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: Duplicate transaction (same fingerprint already exists)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /transactions/{id}:
    parameters:
      - $ref: '#/components/parameters/TransactionId'
    get:
      tags: [Transactions]
      operationId: getTransaction
      summary: Get a single transaction
      responses:
        '200':
          description: Transaction details
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Transaction' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Transactions]
      operationId: updateTransaction
      summary: Edit a manual transaction
      description: |
        Only transactions with `source=manual` can be edited. API-sourced rows
        are immutable.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransactionUpdateRequest' }
      responses:
        '200':
          description: Updated transaction
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Transaction' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Transaction is not manually sourced and cannot be edited
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Transactions]
      operationId: deleteTransaction
      summary: Remove a manual transaction
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Transaction removed
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Transaction is not manually sourced and cannot be deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ────────────────────────── Portfolio ──────────────────────────
  /portfolio:
    get:
      tags: [Portfolio]
      operationId: getPortfolio
      summary: Current portfolio snapshot
      parameters:
        - $ref: '#/components/parameters/DisplayCurrency'
      responses:
        '200':
          description: Portfolio snapshot
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PortfolioSnapshot' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /portfolio/history:
    get:
      tags: [Portfolio]
      operationId: getPortfolioHistory
      summary: Portfolio value over time
      parameters:
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [1d, 1w, 1m, 3m, 6m, 1y, all]
        - $ref: '#/components/parameters/DisplayCurrency'
      responses:
        '200':
          description: Historical series
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PortfolioHistoryResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /portfolio/allocation:
    get:
      tags: [Portfolio]
      operationId: getPortfolioAllocation
      summary: Portfolio allocation breakdown
      responses:
        '200':
          description: Allocation by symbol, asset type and currency
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PortfolioAllocationResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /portfolio/performance:
    get:
      tags: [Portfolio]
      operationId: getPortfolioPerformance
      summary: Portfolio performance vs. a benchmark
      parameters:
        - name: benchmark
          in: query
          required: true
          schema:
            type: string
            enum: [SPX, QQQ, ACWI, BTC]
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [1m, 3m, 6m, 1y, all]
        - $ref: '#/components/parameters/DisplayCurrency'
      responses:
        '200':
          description: Performance comparison
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PortfolioPerformance' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Benchmark requires Plus or higher
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /portfolio/performance/compare:
    get:
      tags: [Portfolio]
      operationId: comparePortfolioPerformance
      summary: Compare portfolio against up to three benchmarks
      description: |
        Multi-benchmark variant backing the `/performance` screen (design
        brief §15.2). Returns per-benchmark returns + alpha + series, plus a
        single `stats` block summarising the portfolio itself (best/worst
        month, average return, volatility). Tier-gated: Plus+.
      parameters:
        - name: benchmarks
          in: query
          required: true
          description: Comma-separated list, 1–3 items.
          schema:
            type: string
            examples: ['SPX', 'SPX,QQQ', 'SPX,QQQ,ACWI']
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [1m, 3m, 6m, 1y, all]
        - $ref: '#/components/parameters/DisplayCurrency'
      responses:
        '200':
          description: Multi-benchmark comparison
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PortfolioPerformanceCompare' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Multi-benchmark comparison requires Plus or higher
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /portfolio/dividends:
    get:
      tags: [Portfolio]
      operationId: getPortfolioDividends
      summary: Upcoming and historical dividends
      description: |
        Tier-gated: Plus+ only. Free callers receive `403 FEATURE_LOCKED`.
        See design brief §15.1.
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Dividend events
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/DividendEvent' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Dividend calendar requires Plus or higher
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

