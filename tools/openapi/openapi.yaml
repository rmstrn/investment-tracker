  /me/notification-preferences:
    get:
      tags: [Notifications]
      operationId: getNotificationPreferences
      summary: Get per-type channel preferences and digest settings
      responses:
        '200':
          description: Preferences
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationPreferences' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [Notifications]
      operationId: updateNotificationPreferences
      summary: Update channel preferences / digest settings
      description: |
        Partial update. Omitted `preferences[*]` entries are left unchanged;
        supply only the rows the user actually toggled. Digest settings are
        replaced wholesale when `digest` is present.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NotificationPreferencesUpdate' }
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationPreferences' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ──────────────────────────── Exports ──────────────────────────
  /exports:
    post:
      tags: [Users]
      operationId: createExport
      summary: Queue a CSV export job
      description: |
        Async-only (see design brief §15.5). Returns `202` with a job id;
        clients poll `GET /exports/{id}` until `status=done` and then
        download `result_url`. Tier-gated: Plus+.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExportCreateRequest' }
      responses:
        '202':
          description: Export queued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExportJob' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: CSV export requires Plus or higher
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /exports/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Users]
      operationId: getExport
      summary: Poll an export job
      responses:
        '200':
          description: Job state
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExportJob' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─────────────────────── Analytics & Tax (Pro) ─────────────────
  /portfolio/analytics:
    get:
      tags: [Portfolio]
      operationId: getPortfolioAnalytics
      summary: Advanced analytics (Sharpe, Sortino, drawdown, factors, …)
      description: |
        Pro-only. Returns the full quant block backing `/analytics`
        (design brief §15.3). Free/Plus receive `403 FEATURE_LOCKED`.
      parameters:
        - name: period
          in: query
          required: true
          schema:
            type: string
            enum: [3m, 6m, 1y, 3y, all]
            default: 1y
        - $ref: '#/components/parameters/DisplayCurrency'
      responses:
        '200':
          description: Analytics block
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PortfolioAnalytics' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Analytics require Pro
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /portfolio/tax:
    get:
      tags: [Portfolio]
      operationId: getPortfolioTax
      summary: Tax report for a jurisdiction and year
      description: Pro-only. Free/Plus receive `403 FEATURE_LOCKED`.
      parameters:
        - $ref: '#/components/parameters/TaxJurisdiction'
        - $ref: '#/components/parameters/TaxYear'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Tax report
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TaxReport' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Tax reports require Pro
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /portfolio/tax/export:
    get:
      tags: [Portfolio]
      operationId: exportPortfolioTax
      summary: Download a tax report as PDF or CSV
      parameters:
        - $ref: '#/components/parameters/TaxJurisdiction'
        - $ref: '#/components/parameters/TaxYear'
        - name: format
          in: query
          required: true
          schema:
            type: string
            enum: [pdf, csv]
      responses:
        '200':
          description: |
            Returns the rendered file directly for PDF/CSV; clients should
            trigger a download rather than parse the body.
          content:
            application/pdf:
              schema: { type: string, format: binary }
            text/csv:
              schema: { type: string }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Tax export requires Pro
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ─────────────────────────── Glossary ──────────────────────────
  /glossary:
    get:
      tags: [AI]
      operationId: listGlossaryTerms
      summary: List financial glossary terms (Explainer module — §14.3)
      security: []
      parameters:
        - name: locale
          in: query
          schema: { type: string, default: en }
      responses:
        '200':
          description: Glossary terms
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/GlossaryTerm' }

  /glossary/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
          pattern: '^[a-z0-9-]+$'
    get:
      tags: [AI]
      operationId: getGlossaryTerm
      summary: Get a single glossary term
      security: []
      parameters:
        - name: locale
          in: query
          schema: { type: string, default: en }
      responses:
        '200':
          description: Glossary term
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GlossaryTerm' }
        '404': { $ref: '#/components/responses/NotFound' }

  # ─────────────────────────── Webhooks ──────────────────────────
  /auth/webhook:
    post:
      tags: [Webhooks]
      operationId: clerkWebhook
      summary: Clerk webhook (user.created, user.updated, user.deleted)
      description: |
        Verified via Svix signature headers (`svix-id`, `svix-timestamp`,
        `svix-signature`). The body is the raw Clerk event envelope and is
        validated on the server — this contract does not enumerate every
        Clerk event type.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200': { description: Processed }
        '400': { $ref: '#/components/responses/ValidationError' }

  /billing/webhook:
    post:
      tags: [Webhooks]
      operationId: stripeWebhook
      summary: Stripe webhook
      description: |
        Verified via `Stripe-Signature` header. The body is the raw Stripe
        event payload and is validated server-side against the Stripe SDK.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        '200': { description: Processed }
        '400': { $ref: '#/components/responses/ValidationError' }

components:
  # ─────────────────────── Security schemes ──────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Bearer JWT issued by Clerk. Validated against Clerk JWKS on every
        request. `sub` claim is mapped to `users.clerk_user_id`.

  # ─────────────────────── Reusable parameters ───────────────────
  parameters:
    AccountId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    TransactionId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    PositionId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    ConversationId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    InsightId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    NotificationId:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
    PaywallTrigger:
      name: trigger
      in: path
      required: true
      description: Paywall context the client is dismissing (see design brief §13.4).
      schema: { $ref: '#/components/schemas/PaywallTriggerKind' }
    TaxJurisdiction:
      name: jurisdiction
      in: query
      required: true
      description: ISO-3166 alpha-2 country code for the tax regime.
      schema:
        type: string
        enum: [US, DE, FR, UK, ES, NL]
    TaxYear:
      name: year
      in: query
      required: true
      schema:
        type: integer
        minimum: 2000
        maximum: 2100
    Cursor:
      name: cursor
      in: query
      required: false
      description: |
        Opaque pagination cursor returned in the previous response's `meta.next_cursor`.
      schema: { type: string }
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 25
        minimum: 1
        maximum: 100
    DisplayCurrency:
      name: display_currency
      in: query
      required: false
      description: |
        ISO 4217 currency to use for the `display` half of the response's
        values. Defaults to the user's `display_currency` on their profile.
      schema: { $ref: '#/components/schemas/Currency' }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: |
        Opaque client-generated key (UUID v4 recommended, max 255 chars).
        The server stores the response for 24 hours and replays it for a
        repeated key on the same authenticated user + same endpoint. Keys
        are ignored on `GET` requests.
      schema: { type: string, maxLength: 255 }

  # ─────────────────────── Reusable headers ──────────────────────
  headers:
    RateLimitLimit:
      description: Requests permitted in the current window.
      schema: { type: integer }
    RateLimitRemaining:
      description: Requests remaining in the current window.
      schema: { type: integer }
    RateLimitReset:
      description: Unix epoch seconds when the window resets.
      schema: { type: integer }

  # ─────────────────────── Reusable responses ────────────────────
  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Forbidden:
      description: Authenticated but not allowed (e.g. tier limit, not owner).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: Resource does not exist or is not owned by the caller.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    ValidationError:
      description: Request failed validation.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Conflict:
      description: Resource state conflict (e.g. duplicate fingerprint).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    RateLimited:
      description: Rate limit exceeded.
      headers:
        X-RateLimit-Limit: { $ref: '#/components/headers/RateLimitLimit' }
        X-RateLimit-Remaining: { $ref: '#/components/headers/RateLimitRemaining' }
        X-RateLimit-Reset: { $ref: '#/components/headers/RateLimitReset' }
        Retry-After:
          description: Seconds until the caller may retry.
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    InternalError:
      description: Unhandled server error.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ─────────────────────────── Schemas ───────────────────────────
  schemas:
    # ── Primitives ────────────────────────────────────────────
    Money:
      type: string
      pattern: '^-?[0-9]+(\.[0-9]{1,10})?$'
      description: |
        Decimal money string, up to 10 fractional digits. Matches the
        `NUMERIC(30, 10)` precision used in the database.
      examples: ['123.4567890000', '-5.0', '0']
    Currency:
      type: string
      pattern: '^[A-Z]{3}$'
      description: ISO 4217 currency code.
      examples: ['USD', 'EUR', 'GBP', 'JPY', 'BTC', 'USDT']
    AssetType:
      type: string
      enum: [stock, etf, crypto]
    TransactionType:
      type: string
      enum: [buy, sell, dividend, split, transfer_in, transfer_out, fee]
    ConnectionType:
      type: string
      enum: [api, aggregator, import, manual]
    AccountType:
      type: string
      enum: [broker, crypto, manual]
    SyncState:
      type: string
      enum: [pending, syncing, ok, error, paused]
      description: |
        - `pending` — created, not yet synced.
        - `syncing` — a sync is in-flight.
        - `ok` — last sync succeeded.
        - `error` — last sync failed; user action needed (§18.2).
        - `paused` — user-initiated pause; cron skips this account until
          `POST /accounts/{id}/resume`.
    SubscriptionTier:
      type: string
      enum: [free, plus, pro]
    InsightSeverity:
      type: string
      enum: [info, warning, critical]
    InsightType:
      type: string
      description: |
        Fixed taxonomy for rendering (icon, colour). `behavioral` covers the
        Behavioral Coach module (design brief §14.1).
      enum:
        - diversification
        - risk
        - performance
        - rebalance
        - cost
        - behavioral

    # ── Envelopes ─────────────────────────────────────────────
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, request_id]
          properties:
            code:
              type: string
              description: |
                Stable machine-readable error code.

                - `TIER_LIMIT_EXCEEDED` — quota exhausted on the current tier
                  (e.g. 5/5 AI messages today). UI shows usage-reset messaging.
                - `FEATURE_LOCKED` — tier does not include this feature at all
                  (e.g. Free/Plus calling `/portfolio/analytics`). UI shows
                  the upgrade/blur-preview treatment from design brief §13.5.
              enum:
                - VALIDATION_ERROR
                - INVALID_REQUEST
                - UNAUTHENTICATED
                - FORBIDDEN
                - TIER_LIMIT_EXCEEDED
                - FEATURE_LOCKED
                - NOT_FOUND
                - CONFLICT
                - DUPLICATE_TRANSACTION
                - IDEMPOTENCY_KEY_CONFLICT
                - IDEMPOTENCY_IN_PROGRESS
                - JURISDICTION_NOT_SUPPORTED
                - QUOTE_NOT_AVAILABLE
                - RATE_LIMIT_EXCEEDED
                - EXTERNAL_SERVICE_ERROR
                - NOT_IMPLEMENTED
                - INTERNAL_ERROR
            message:
              type: string
              description: Human-readable message. Do not parse this.
            details:
              type: object
              additionalProperties: true
              description: Structured details for the error (e.g. failing field).
            request_id:
              type: string
              description: Correlation id; include this in bug reports.

    PaginationMeta:
      type: object
      required: [has_more]
      properties:
        next_cursor:
          type: [string, "null"]
          description: Pass as `?cursor=` on the next request. `null` if no more results.
        has_more:
          type: boolean
        total_count:
          type: [integer, "null"]
          minimum: 0
          description: Only populated for endpoints where the count is cheap.

    PaginatedEnvelope:
      type: object
      required: [meta]
      properties:
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    # ── System ────────────────────────────────────────────────
    Health:
      type: object
      required: [status, version]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        version: { type: string }
        uptime_seconds: { type: integer }

    # ── User ──────────────────────────────────────────────────
    User:
      type: object
      required:
        - id
        - clerk_user_id
        - email
        - display_currency
        - locale
        - subscription_tier
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid }
        clerk_user_id: { type: string }
        email: { type: string, format: email }
        display_currency: { $ref: '#/components/schemas/Currency' }
        locale: { type: string, examples: ['en', 'en-US', 'ru'] }
        subscription_tier: { $ref: '#/components/schemas/SubscriptionTier' }
        stripe_customer_id:
          type: [string, "null"]
        deletion_scheduled_at:
          type: [string, "null"]
          format: date-time
          description: |
            Set when the user initiated account deletion (see §17.4).
            The hard-delete worker runs after a 7-day grace period; the user
            can call `POST /me/undo-deletion` within that window to cancel.
            `null` means the account is active / not pending deletion.
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    UserUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        display_currency: { $ref: '#/components/schemas/Currency' }
        locale: { type: string }

    UsageSummary:
      type: object
      required: [tier, counters]
      properties:
        tier: { $ref: '#/components/schemas/SubscriptionTier' }
        counters:
          type: object
          required: [ai_messages_daily, connected_accounts, insights_weekly]
          properties:
            ai_messages_daily:
              $ref: '#/components/schemas/UsageCounter'
            connected_accounts:
              $ref: '#/components/schemas/UsageCounter'
            insights_weekly:
              $ref: '#/components/schemas/UsageCounter'

    UsageCounter:
      type: object
      required: [used, limit]
      properties:
        used: { type: integer }
        limit:
          type: [integer, "null"]
          description: '`null` means unlimited.'
        reset_at:
          type: [string, "null"]
          format: date-time

    UserExportBundle:
      type: object
      required: [generated_at, user, accounts, transactions]
      additionalProperties: true
      properties:
        generated_at: { type: string, format: date-time }
        user: { $ref: '#/components/schemas/User' }
        accounts:
          type: array
          items: { $ref: '#/components/schemas/Account' }
        transactions:
          type: array
          items: { $ref: '#/components/schemas/Transaction' }

    # ── Account ───────────────────────────────────────────────
    Account:
      type: object
      required:
        - id
        - broker_name
        - display_name
        - account_type
        - connection_type
        - base_currency
        - sync_status
        - is_included_in_portfolio
        - created_at
        - updated_at
      properties:
        id: { type: string, format: uuid }
        broker_name:
          type: string
          description: |
            Canonical broker/exchange identifier. Free-text to allow new
            integrations without a spec bump; known values include
            `interactive_brokers`, `schwab`, `fidelity`, `binance`,
            `coinbase`, `kraken`, `manual`.
          examples: [interactive_brokers, binance]
        display_name:
          type: string
          maxLength: 120
          description: User-editable label.
        account_type: { $ref: '#/components/schemas/AccountType' }
        connection_type: { $ref: '#/components/schemas/ConnectionType' }
        external_account_id:
          type: [string, "null"]
        base_currency: { $ref: '#/components/schemas/Currency' }
        last_synced_at:
          type: [string, "null"]
          format: date-time
        sync_status: { $ref: '#/components/schemas/SyncState' }
        sync_error:
          type: [string, "null"]
        is_included_in_portfolio:
          type: boolean
          description: |
            When false, the account is hidden from portfolio aggregations
            (`/portfolio`, `/positions`, snapshots) but still listed in
            `/settings/accounts` (§18.1). Toggled via `PATCH /accounts/{id}`.
        deleted_at:
          type: [string, "null"]
          format: date-time
          description: Present on tombstoned rows (usually omitted from live list queries).
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AccountCreateRequest:
      type: object
      required: [connection_type, display_name]
      additionalProperties: false
      properties:
        connection_type: { $ref: '#/components/schemas/ConnectionType' }
        broker_name:
          type: string
          description: Required when `connection_type != manual`.
        display_name: { type: string, maxLength: 120 }
        base_currency: { $ref: '#/components/schemas/Currency' }
        account_type: { $ref: '#/components/schemas/AccountType' }
        redirect_url:
          type: string
          format: uri
          description: |
            For `aggregator` connections: URL to send the user after OAuth.

    AccountCreateResponse:
      type: object
      required: [account]
      properties:
        account: { $ref: '#/components/schemas/Account' }
        connect_url:
          type: [string, "null"]
          format: uri
          description: |
            For `aggregator` connections: open this URL in a browser/webview
            so the user can complete OAuth at SnapTrade/Plaid. `null` for
            `manual` accounts.

    AccountUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        display_name: { type: string, maxLength: 120 }
        is_included_in_portfolio:
          type: boolean
          description: Toggle inclusion in portfolio aggregations (§18.1).

    AccountSyncStatus:
      type: object
      required: [account_id, sync_status, last_synced_at]
      properties:
        account_id: { type: string, format: uuid }
        sync_status: { $ref: '#/components/schemas/SyncState' }
        last_synced_at:
          type: [string, "null"]
          format: date-time
        sync_error:
          type: [string, "null"]
        next_sync_at:
          type: [string, "null"]
          format: date-time

    AccountReconnectResponse:
      type: object
      required: [account]
      properties:
        account: { $ref: '#/components/schemas/Account' }
        connect_url:
          type: [string, "null"]
          format: uri
          description: |
            Fresh aggregator OAuth URL. Open in browser/webview. `null` for
            `manual` accounts or when the account has no prior external auth.

    # ── Transaction ───────────────────────────────────────────
    Transaction:
      type: object
      required:
        - id
        - account_id
        - symbol
        - asset_type
        - transaction_type
        - quantity
        - currency
        - executed_at
        - source
        - created_at
      properties:
        id: { type: string, format: uuid }
        account_id: { type: string, format: uuid }
        symbol: { type: string, examples: [AAPL, BTC, VWCE] }
        asset_type: { $ref: '#/components/schemas/AssetType' }
        transaction_type: { $ref: '#/components/schemas/TransactionType' }
        quantity: { $ref: '#/components/schemas/Money' }
        price:
          oneOf:
            - $ref: '#/components/schemas/Money'
            - type: "null"
          description: Null for `split` events.
        currency: { $ref: '#/components/schemas/Currency' }
        fee: { $ref: '#/components/schemas/Money' }
        executed_at: { type: string, format: date-time }
        source:
          type: string
          enum: [manual, api, aggregator, import]
        source_details:
          type: [object, "null"]
          additionalProperties: true
          description: |
            Loose provider-specific payload (e.g. SnapTrade `trade_id`, CSV
            row number). Not intended to be consumed by clients.
        fingerprint:
          type: string
          description: Opaque dedup hash.
        notes:
          type: [string, "null"]
          maxLength: 1000
        created_at: { type: string, format: date-time }

    TransactionCreateRequest:
      type: object
      required:
        - account_id
        - symbol
        - asset_type
        - transaction_type
        - quantity
        - currency
        - executed_at
      additionalProperties: false
      properties:
        account_id: { type: string, format: uuid }
        symbol: { type: string }
        asset_type: { $ref: '#/components/schemas/AssetType' }
        transaction_type: { $ref: '#/components/schemas/TransactionType' }
        quantity: { $ref: '#/components/schemas/Money' }
        price: { $ref: '#/components/schemas/Money' }
        currency: { $ref: '#/components/schemas/Currency' }
        fee: { $ref: '#/components/schemas/Money' }
        executed_at: { type: string, format: date-time }
        notes: { type: string, maxLength: 1000 }

    TransactionUpdateRequest:
      type: object
      additionalProperties: false
      properties:
        quantity: { $ref: '#/components/schemas/Money' }
        price: { $ref: '#/components/schemas/Money' }
        fee: { $ref: '#/components/schemas/Money' }
        executed_at: { type: string, format: date-time }
        notes: { type: string, maxLength: 1000 }

    # ── Portfolio values (multi-currency envelope) ────────────
    MonetaryValue:
      type: object
      required: [currency, total_value, total_cost]
      properties:
        currency: { $ref: '#/components/schemas/Currency' }
        total_value: { $ref: '#/components/schemas/Money' }
        total_cost: { $ref: '#/components/schemas/Money' }

    DisplayMonetaryValue:
      allOf:
        - $ref: '#/components/schemas/MonetaryValue'
        - type: object
          required: [fx_rate, fx_date]
          properties:
            fx_rate:
              type: string
              pattern: '^-?[0-9]+(\.[0-9]{1,10})?$'
              description: |
                Rate used to convert `base.currency` → `display.currency`.
                Value 1 when `base == display`.
            fx_date:
              type: string
              format: date
              description: '`fx_rates.as_of` used for this conversion.'

    PortfolioValues:
      type: object
      required: [base, display]
      properties:
        base: { $ref: '#/components/schemas/MonetaryValue' }
        display: { $ref: '#/components/schemas/DisplayMonetaryValue' }

    # ── Portfolio ─────────────────────────────────────────────
    PortfolioAllocation:
      type: object
      additionalProperties:
        type: number
        format: float
        minimum: 0
        maximum: 1
      description: |
        Fractions summing to ~1.0 (±rounding). Keys are symbols, asset-type
        labels or currency codes depending on the field.

    PortfolioSnapshot:
      type: object
      required: [snapshot_date, values, allocation, by_asset_type, by_currency]
      properties:
        snapshot_date: { type: string, format: date }
        values: { $ref: '#/components/schemas/PortfolioValues' }
        pnl_absolute:
          type: object
          required: [base, display]
          properties:
            base: { $ref: '#/components/schemas/Money' }
            display: { $ref: '#/components/schemas/Money' }
        pnl_percent:
          type: number
          format: float
          description: Signed fraction; 0.123 == +12.3%.
        allocation: { $ref: '#/components/schemas/PortfolioAllocation' }
        by_asset_type: { $ref: '#/components/schemas/PortfolioAllocation' }
        by_currency: { $ref: '#/components/schemas/PortfolioAllocation' }

    PortfolioHistoryPoint:
      type: object
      required: [date, value_base, value_display]
      properties:
        date: { type: string, format: date }
        value_base: { $ref: '#/components/schemas/Money' }
        value_display: { $ref: '#/components/schemas/Money' }

    PortfolioHistoryResponse:
      type: object
      required: [period, base_currency, display_currency, points]
      properties:
        period:
          type: string
          enum: [1d, 1w, 1m, 3m, 6m, 1y, all]
        base_currency: { $ref: '#/components/schemas/Currency' }
        display_currency: { $ref: '#/components/schemas/Currency' }
        points:
          type: array
          items: { $ref: '#/components/schemas/PortfolioHistoryPoint' }

    PortfolioAllocationResponse:
      type: object
      required: [by_symbol, by_asset_type, by_currency]
      properties:
        by_symbol: { $ref: '#/components/schemas/PortfolioAllocation' }
        by_asset_type: { $ref: '#/components/schemas/PortfolioAllocation' }
        by_currency: { $ref: '#/components/schemas/PortfolioAllocation' }

    PortfolioPerformance:
      type: object
      required: [period, benchmark, portfolio_return_percent, benchmark_return_percent]
      properties:
        period: { type: string, enum: [1m, 3m, 6m, 1y, all] }
        benchmark: { type: string, enum: [SPX, QQQ, ACWI, BTC] }
        portfolio_return_percent: { type: number, format: float }
        benchmark_return_percent:
          type: [number, "null"]
          format: float
          description: >
            Return of the benchmark over the same period. Null when
            benchmark data is unavailable — callers that need a hard
            fail can key on the `X-Benchmark-Unavailable` response
            header (TD-020 tracks populating this with real data).
        alpha_percent:
          type: [number, "null"]
          format: float
          description: >
            portfolio_return - benchmark_return. Null whenever
            benchmark_return_percent is null.
        stats: { $ref: '#/components/schemas/PortfolioPerformanceStats' }
        series:
          type: array
          items:
            type: object
            required: [date, portfolio_return_percent, benchmark_return_percent]
            properties:
              date: { type: string, format: date }
              portfolio_return_percent: { type: number, format: float }
              benchmark_return_percent: { type: number, format: float }

    PortfolioPerformanceStats:
      type: object
      description: |
        Rolled-up stats over the selected period, independent of any
        benchmark. Rendered in the period breakdown table (§15.2).
      required: [avg_return_percent, volatility]
      properties:
        best_month:
          type: [object, "null"]
          required: [month, return_percent]
          properties:
            month: { type: string, description: 'YYYY-MM' }
            return_percent: { type: number, format: float }
        worst_month:
          type: [object, "null"]
          required: [month, return_percent]
          properties:
            month: { type: string, description: 'YYYY-MM' }
            return_percent: { type: number, format: float }
        avg_return_percent:
          type: number
          format: float
          description: Arithmetic mean of monthly returns over the period.
        volatility:
          type: number
          format: float
          description: Annualised stdev of monthly returns (unitless decimal, 0.12 == 12%).

    PortfolioPerformanceBenchmark:
      type: object
      required: [benchmark, benchmark_return_percent, alpha_percent]
      properties:
        benchmark: { type: string, enum: [SPX, QQQ, ACWI, BTC] }
        benchmark_return_percent:
          type: [number, "null"]
          format: float
          description: >
            Same nullability rule as PortfolioPerformance. Null when
            benchmark_prices is unavailable; X-Benchmark-Unavailable
            response header signals the gap (TD-020).
        alpha_percent:
          type: [number, "null"]
          format: float
          description: Null whenever benchmark_return_percent is null.
        series:
          type: array
          items:
            type: object
            required: [date, benchmark_return_percent]
            properties:
              date: { type: string, format: date }
              benchmark_return_percent: { type: number, format: float }

    PortfolioPerformanceCompare:
      type: object
      required: [period, portfolio_return_percent, benchmarks, stats]
      properties:
        period: { type: string, enum: [1m, 3m, 6m, 1y, all] }
        portfolio_return_percent: { type: number, format: float }
        portfolio_series:
          type: array
          items:
            type: object
            required: [date, portfolio_return_percent]
            properties:
              date: { type: string, format: date }
              portfolio_return_percent: { type: number, format: float }
        benchmarks:
          type: array
          minItems: 1
          maxItems: 3
          items: { $ref: '#/components/schemas/PortfolioPerformanceBenchmark' }
        stats: { $ref: '#/components/schemas/PortfolioPerformanceStats' }

    DividendEvent:
      type: object
      required: [symbol, asset_type, currency, amount_per_share, pay_date, status]
      properties:
        symbol: { type: string }
        asset_type: { $ref: '#/components/schemas/AssetType' }
        currency: { $ref: '#/components/schemas/Currency' }
        amount_per_share: { $ref: '#/components/schemas/Money' }
        ex_date: { type: [string, "null"], format: date }
        record_date: { type: [string, "null"], format: date }
        pay_date: { type: string, format: date }
        total_amount:
          allOf: [{ $ref: '#/components/schemas/Money' }]
          description: Based on the user's shares held at ex_date.
        status:
          type: string
          enum: [upcoming, paid]

    # ── Position ──────────────────────────────────────────────
    Position:
      type: object
      required:
        - id
        - account_id
        - symbol
        - asset_type
        - quantity
        - currency
        - values
        - last_calculated_at
      properties:
        id: { type: string, format: uuid }
        account_id: { type: string, format: uuid }
        symbol: { type: string }
        asset_type: { $ref: '#/components/schemas/AssetType' }
        quantity: { $ref: '#/components/schemas/Money' }
        avg_cost:
          oneOf:
            - $ref: '#/components/schemas/Money'
            - type: "null"
        currency: { $ref: '#/components/schemas/Currency' }
        values: { $ref: '#/components/schemas/PortfolioValues' }
        pnl_absolute:
          type: object
          required: [base, display]
          properties:
            base: { $ref: '#/components/schemas/Money' }
            display: { $ref: '#/components/schemas/Money' }
        pnl_percent:
          type: number
          format: float
        last_calculated_at: { type: string, format: date-time }

    # ── Market data ───────────────────────────────────────────
    MarketQuote:
      type: object
      required: [symbol, asset_type, currency, price, as_of, source]
      properties:
        symbol: { type: string }
        asset_type: { $ref: '#/components/schemas/AssetType' }
        currency: { $ref: '#/components/schemas/Currency' }
        price: { $ref: '#/components/schemas/Money' }
        previous_close:
          oneOf:
            - $ref: '#/components/schemas/Money'
            - type: "null"
        change_percent:
          type: [number, "null"]
          format: float
        as_of: { type: string, format: date-time }
        source: { type: string, examples: [polygon, coingecko] }

    MarketHistoryPoint:
      type: object
      required: [time, open, high, low, close, volume]
      properties:
        time: { type: string, format: date-time }
        open: { $ref: '#/components/schemas/Money' }
        high: { $ref: '#/components/schemas/Money' }
        low: { $ref: '#/components/schemas/Money' }
        close: { $ref: '#/components/schemas/Money' }
        volume: { type: string, description: 'Integer volume as string (some crypto venues emit very large values).' }

    MarketHistoryResponse:
      type: object
      required: [symbol, asset_type, currency, interval, points]
      properties:
        symbol: { type: string }
        asset_type: { $ref: '#/components/schemas/AssetType' }
        currency: { $ref: '#/components/schemas/Currency' }
        interval: { type: string }
        points:
          type: array
          items: { $ref: '#/components/schemas/MarketHistoryPoint' }

    MarketSearchResult:
      type: object
      required: [symbol, asset_type, name, currency]
      properties:
        symbol: { type: string }
        asset_type: { $ref: '#/components/schemas/AssetType' }
        name: { type: string }
        currency: { $ref: '#/components/schemas/Currency' }
        exchange: { type: [string, "null"] }
        logo_url: { type: [string, "null"], format: uri }

    # ── AI: conversations & messages ──────────────────────────
    AIConversationSummary:
      type: object
      required: [id, created_at, updated_at]
      properties:
        id: { type: string, format: uuid }
        title: { type: [string, "null"] }
        last_message_preview: { type: [string, "null"] }
        message_count: { type: integer, minimum: 0 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    AIConversation:
      allOf:
        - $ref: '#/components/schemas/AIConversationSummary'

    AIConversationDetail:
      type: object
      required: [conversation, messages, meta]
      properties:
        conversation: { $ref: '#/components/schemas/AIConversation' }
        messages:
          type: array
          items: { $ref: '#/components/schemas/AIMessage' }
        meta: { $ref: '#/components/schemas/PaginationMeta' }

    AIMessage:
      type: object
      required: [id, conversation_id, role, content, created_at]
      properties:
        id: { type: string, format: uuid }
        conversation_id: { type: string, format: uuid }
        role:
          type: string
          enum: [user, assistant, tool]
        content:
          type: array
          items: { $ref: '#/components/schemas/AIMessageContent' }
        tokens_used:
          type: [integer, "null"]
        created_at: { type: string, format: date-time }

    AIMessageContent:
      oneOf:
        - $ref: '#/components/schemas/AIMessageContentText'
        - $ref: '#/components/schemas/AIMessageContentToolUse'
        - $ref: '#/components/schemas/AIMessageContentToolResult'
        - $ref: '#/components/schemas/AIMessageContentImpactCard'
        - $ref: '#/components/schemas/AIMessageContentCallout'
      discriminator:
        propertyName: type
        mapping:
          text: '#/components/schemas/AIMessageContentText'
          tool_use: '#/components/schemas/AIMessageContentToolUse'
          tool_result: '#/components/schemas/AIMessageContentToolResult'
          impact_card: '#/components/schemas/AIMessageContentImpactCard'
          callout: '#/components/schemas/AIMessageContentCallout'

    AIMessageRenderableContent:
      description: |
        Subset of `AIMessageContent` that can appear inside a `tool_result`
        block (and anywhere else the protocol allows the model to return
        inline rich content without re-entering the tool-use protocol).
      oneOf:
        - $ref: '#/components/schemas/AIMessageContentText'
        - $ref: '#/components/schemas/AIMessageContentImpactCard'
        - $ref: '#/components/schemas/AIMessageContentCallout'
      discriminator:
        propertyName: type
        mapping:
          text: '#/components/schemas/AIMessageContentText'
          impact_card: '#/components/schemas/AIMessageContentImpactCard'
          callout: '#/components/schemas/AIMessageContentCallout'

    AIMessageContentText:
      type: object
      required: [type, text]
      properties:
        type: { type: string, const: text }
        text: { type: string }

    AIMessageContentToolUse:
      type: object
      required: [type, tool_use_id, name, input]
      properties:
        type: { type: string, const: tool_use }
        tool_use_id: { type: string }
        name:
          type: string
          description: |
            Tool name, e.g. `get_portfolio`, `get_positions`, `get_quote`,
            `get_market_history`, `search_tickers`.
        input:
          type: object
          additionalProperties: true

    AIMessageContentToolResult:
      type: object
      required: [type, tool_use_id, is_error, content]
      properties:
        type: { type: string, const: tool_result }
        tool_use_id: { type: string }
        is_error: { type: boolean }
        content:
          type: array
          items: { $ref: '#/components/schemas/AIMessageRenderableContent' }

    AIMessageContentImpactCard:
      type: object
      required: [type, scenario, before, after]
      description: |
        Structured rendering payload for the Scenario Simulator
        (design brief §14.2). The assistant emits this block inside a
        `tool_result` (or directly as a top-level content block when
        deterministic) so clients render the impact-card UI natively
        instead of parsing narrative text.
      properties:
        type: { type: string, const: impact_card }
        scenario:
          type: string
          maxLength: 200
          description: User-readable label, e.g. "USD drops 10%".
        before: { $ref: '#/components/schemas/PortfolioSnapshot' }
        after: { $ref: '#/components/schemas/PortfolioSnapshot' }
        top_affected_positions:
          type: array
          maxItems: 5
          items: { $ref: '#/components/schemas/AffectedPosition' }
        narrative:
          type: string
          description: 1–2 sentence summary of the delta.

    AIMessageContentCallout:
      type: object
      required: [type, kind, title, body]
      description: |
        Inline callout block. Drives Behavioral Coach nudges (§14.1) and
        Explainer definitions (§14.3). UI styling is driven by `kind`.
      properties:
        type: { type: string, const: callout }
        kind:
          type: string
          enum: [behavioral, explainer, info, warning]
        title: { type: string, maxLength: 120 }
        body: { type: string }
        term_slug:
          type: [string, "null"]
          description: |
            For `kind=explainer` — `GlossaryTerm.slug` the callout defines.
            Clients MAY deep-link to `/glossary/{slug}` for more detail.

    AffectedPosition:
      type: object
      required: [symbol, asset_type, value_before, value_after, delta_percent]
      properties:
        symbol: { type: string }
        asset_type: { $ref: '#/components/schemas/AssetType' }
        value_before: { $ref: '#/components/schemas/Money' }
        value_after: { $ref: '#/components/schemas/Money' }
        delta_percent:
          type: number
          format: float
          description: Signed fraction; 0.123 == +12.3%.

    AIChatRequest:
      type: object
      required: [conversation_id, message]
      additionalProperties: false
      properties:
        conversation_id: { type: string, format: uuid }
        message:
          type: object
          required: [content]
          properties:
            content:
              type: array
              minItems: 1
              items: { $ref: '#/components/schemas/AIMessageContentText' }
        model:
          type: string
          description: |
            Optional override; defaults to the server-side Claude model for
            the user's tier.
        context:
          $ref: '#/components/schemas/ChatContext'

    ChatContext:
      type: object
      required: [type]
      additionalProperties: false
      description: |
        Caller-supplied hint describing where the conversation was opened from.
        The AI service uses this to seed the system prompt (e.g. slide-over
        chat opened on a position detail → "About AAPL"). Clients MAY omit it
        for plain `/chat` page conversations.
      properties:
        type:
          type: string
          enum: [dashboard, position, insight, transaction]
        ref_id:
          type: [string, "null"]
          description: |
            Resource identifier matching the `type`. For `type=position` this
            is a symbol (e.g. `AAPL`) or a positions UUID; for `insight` /
            `transaction` it is the corresponding UUID. Ignored when `type=dashboard`.

    AIChatResponse:
      type: object
      required: [conversation_id, message]
      properties:
        conversation_id: { type: string, format: uuid }
        message: { $ref: '#/components/schemas/AIMessage' }
        tokens_used: { type: integer }

    AIChatStreamEvent:
      oneOf:
        - $ref: '#/components/schemas/AIStreamEventMessageStart'
        - $ref: '#/components/schemas/AIStreamEventContentBlockStart'
        - $ref: '#/components/schemas/AIStreamEventContentDelta'
        - $ref: '#/components/schemas/AIStreamEventContentBlockStop'
        - $ref: '#/components/schemas/AIStreamEventToolUse'
        - $ref: '#/components/schemas/AIStreamEventToolResult'
        - $ref: '#/components/schemas/AIStreamEventMessageStop'
        - $ref: '#/components/schemas/AIStreamEventError'
      discriminator:
        propertyName: type
        mapping:
          message_start: '#/components/schemas/AIStreamEventMessageStart'
          content_block_start: '#/components/schemas/AIStreamEventContentBlockStart'
          content_delta: '#/components/schemas/AIStreamEventContentDelta'
          content_block_stop: '#/components/schemas/AIStreamEventContentBlockStop'
          tool_use: '#/components/schemas/AIStreamEventToolUse'
          tool_result: '#/components/schemas/AIStreamEventToolResult'
          message_stop: '#/components/schemas/AIStreamEventMessageStop'
          error: '#/components/schemas/AIStreamEventError'

    AIStreamEventMessageStart:
      type: object
      required: [type, message_id, conversation_id]
      properties:
        type: { type: string, const: message_start }
        message_id: { type: string, format: uuid }
        conversation_id: { type: string, format: uuid }

    AIStreamEventContentBlockStart:
      type: object
      required: [type, index, block_type]
      properties:
        type: { type: string, const: content_block_start }
        index: { type: integer }
        block_type: { type: string, enum: [text, tool_use, impact_card, callout] }

    AIStreamEventContentDelta:
      type: object
      required: [type, index, delta]
      properties:
        type: { type: string, const: content_delta }
        index: { type: integer }
        delta:
          type: object
          description: |
            Partial text for the active content block. The translator
            (apps/api/internal/sseproxy/translator.go) always emits
            `{text: string}` — no discriminator, no `input_json_delta`
            variant post-translation. TD-R068 tightened this from the
            previous `additionalProperties: true` shape to match
            wire reality.
          required: [text]
          properties:
            text: { type: string }
          additionalProperties: false

    AIStreamEventContentBlockStop:
      type: object
      required: [type, index]
      properties:
        type: { type: string, const: content_block_stop }
        index: { type: integer }

    AIStreamEventToolUse:
      type: object
      required: [type, tool_use_id, name, input]
      properties:
        type: { type: string, const: tool_use }
        tool_use_id: { type: string }
        name: { type: string }
        input: { type: object, additionalProperties: true }

    AIStreamEventToolResult:
      type: object
      required: [type, tool_use_id, is_error, content]
      properties:
        type: { type: string, const: tool_result }
        tool_use_id: { type: string }
        is_error: { type: boolean }
        content:
          type: array
          items: { $ref: '#/components/schemas/AIMessageContentText' }

    AIStreamEventMessageStop:
      type: object
      required: [type, message_id, tokens_used]
      properties:
        type: { type: string, const: message_stop }
        message_id: { type: string, format: uuid }
        tokens_used: { type: integer }
        stop_reason:
          type: string
          enum: [end_turn, max_tokens, tool_use, error]

    AIStreamEventError:
      type: object
      required: [type, error]
      properties:
        type: { type: string, const: error }
        error:
          type: object
          description: |
            Flat error payload emitted by the translator
            (apps/api/internal/sseproxy/translator.go:errorFrame).
            Not the wrapped ErrorEnvelope shape — TD-R068 corrected
            the spec to match wire reality. request_id is populated
            when the mid-stream error corresponds to an in-flight
            traced request (TD-R048).
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            request_id:
              type: string
              description: |
                The X-Request-ID the client sent on the originating
                /ai/chat/stream call, propagated so mid-stream
                errors correlate to the same trace id as pre-stream
                errors in the JSON envelope. Absent only when the
                inbound request had no X-Request-ID header (local
                dev without middleware.RequestID upstream).
          additionalProperties: false

    # ── AI: insights ──────────────────────────────────────────
    Insight:
      type: object
      required: [id, insight_type, title, body, severity, generated_at]
      properties:
        id: { type: string, format: uuid }
        insight_type: { $ref: '#/components/schemas/InsightType' }
        title: { type: string, maxLength: 200 }
        body: { type: string }
        severity: { $ref: '#/components/schemas/InsightSeverity' }
        data:
          $ref: '#/components/schemas/InsightData'
        generated_at: { type: string, format: date-time }
        viewed_at:
          type: [string, "null"]
          format: date-time
        dismissed_at:
          type: [string, "null"]
          format: date-time

    InsightData:
      type: object
      additionalProperties: true
      description: |
        Structured data payload for rendering the insight UI. The shape is
        specific to `insight_type`. A typed, discriminated schema will be
        introduced once TASK_05 finalises the insight catalogue (see
        `tools/openapi/README.md` → "Open questions").
      # TODO(TASK_05): replace with a discriminated oneOf on insight_type
      #   covering: diversification, risk, performance, rebalance, cost,
      #   behavioral. Track in Decisions log.

    InsightGenerationJob:
      type: object
      required: [job_id, status, queued_at]
      properties:
        job_id: { type: string, format: uuid }
        status:
          type: string
          enum: [queued, running, done, failed]
        queued_at: { type: string, format: date-time }
        insight_id:
          type: [string, "null"]
          format: uuid
          description: Populated once status transitions to `done`.

    # ── Billing ───────────────────────────────────────────────
    Subscription:
      type: object
      required: [tier, status]
      properties:
        tier: { $ref: '#/components/schemas/SubscriptionTier' }
        status:
          type: string
          enum: [active, trialing, past_due, canceled, incomplete]
        current_period_end:
          type: [string, "null"]
          format: date-time
        cancel_at_period_end:
          type: boolean
          default: false
        stripe_subscription_id:
          type: [string, "null"]

    CheckoutRequest:
      type: object
      required: [target_tier]
      additionalProperties: false
      properties:
        target_tier:
          type: string
          enum: [plus, pro]
        success_url: { type: string, format: uri }
        cancel_url: { type: string, format: uri }

    CheckoutResponse:
      type: object
      required: [session_id, url]
      properties:
        session_id: { type: string }
        url: { type: string, format: uri }

    PortalResponse:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri }

    Invoice:
      type: object
      required: [id, amount_due, amount_paid, currency, status, created_at]
      description: Read-only mirror of the subset of fields rendered in settings > billing.
      properties:
        id: { type: string, description: Stripe invoice id (in_...). }
        number:
          type: [string, "null"]
          description: Human-readable invoice number (Stripe-assigned).
        amount_due: { $ref: '#/components/schemas/Money' }
        amount_paid: { $ref: '#/components/schemas/Money' }
        currency: { $ref: '#/components/schemas/Currency' }
        status:
          type: string
          enum: [draft, open, paid, uncollectible, void]
        hosted_invoice_url:
          type: [string, "null"]
          format: uri
        invoice_pdf_url:
          type: [string, "null"]
          format: uri
        period_start:
          type: [string, "null"]
          format: date-time
        period_end:
          type: [string, "null"]
          format: date-time
        created_at: { type: string, format: date-time }

    CancellationReason:
      type: string
      enum: [not_using_enough, too_expensive, missing_feature, other]

    CancellationFeedbackRequest:
      type: object
      required: [reason]
      additionalProperties: false
      properties:
        reason: { $ref: '#/components/schemas/CancellationReason' }
        free_text:
          type: string
          maxLength: 2000
        counter_offer_accepted:
          type: boolean
          default: false
          description: |
            True if the user accepted one of the retention counter-offers
            (see design brief §13.8). False for "cancel anyway".

    CancellationFeedback:
      allOf:
        - $ref: '#/components/schemas/CancellationFeedbackRequest'
        - type: object
          required: [id, created_at]
          properties:
            id: { type: string, format: uuid }
            stripe_subscription_id:
              type: [string, "null"]
            created_at: { type: string, format: date-time }

    # ── Paywall dismissals ────────────────────────────────────
    PaywallTriggerKind:
      type: string
      description: |
        Context key for a soft-paywall modal. Keep in sync with frontend
        constants in packages/ui (see design brief §13.3/§13.4).
      enum:
        - ai_messages_daily
        - insights_weekly
        - connected_accounts
        - pro_feature

    PaywallDismissal:
      type: object
      required: [trigger, dismissed_on, reset_at]
      properties:
        trigger: { $ref: '#/components/schemas/PaywallTriggerKind' }
        dismissed_on:
          type: string
          format: date
          description: UTC day bucket when the dismissal was recorded.
        reset_at:
          type: string
          format: date-time
          description: Next UTC midnight — client MAY re-show the paywall after this instant.

    PaywallDismissalList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/PaywallDismissal' }

    # ── Notifications ─────────────────────────────────────────
    NotificationType:
      type: string
      enum:
        - insight_generated
        - sync_completed
        - sync_failed
        - dividend_paid
        - price_alert
        - billing_event

    Notification:
      type: object
      required: [id, type, title, body, created_at]
      properties:
        id: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/NotificationType' }
        title: { type: string, maxLength: 200 }
        body: { type: string }
        data:
          type: object
          additionalProperties: true
          description: |
            Loose type-specific payload (e.g. `{ "insight_id": "...", "symbol": "AAPL" }`).
            Clients SHOULD prefer `deep_link` for navigation and use `data`
            only for rendering enrichments.
        deep_link:
          type: [string, "null"]
          description: |
            In-app path (e.g. `/insights/<id>`, `/settings/accounts`). Never a
            fully-qualified URL — relative to the web/iOS app root.
        read_at:
          type: [string, "null"]
          format: date-time
        created_at: { type: string, format: date-time }

    NotificationUnreadCount:
      type: object
      required: [unread]
      properties:
        unread:
          type: integer
          minimum: 0
          description: Capped at 99+ server-side — the UI shows "99+" past that.

    NotificationChannelPreference:
      type: object
      required: [email, push, in_app]
      properties:
        email: { type: boolean }
        push: { type: boolean }
        in_app: { type: boolean }

    NotificationDigestPreferences:
      type: object
      required: [enabled, weekday]
      properties:
        enabled: { type: boolean }
        weekday:
          type: integer
          minimum: 0
          maximum: 6
          description: ISO weekday, 0 = Monday.
        quiet_start:
          type: [string, "null"]
          pattern: '^[0-2][0-9]:[0-5][0-9]$'
          description: Local time HH:mm. iOS-only; mirrored server-side for symmetry.
        quiet_end:
          type: [string, "null"]
          pattern: '^[0-2][0-9]:[0-5][0-9]$'

    NotificationPreferences:
      type: object
      required: [preferences, digest]
      properties:
        preferences:
          type: object
          description: |
            Map keyed by `NotificationType`. Missing keys default to all
            channels enabled.
          additionalProperties:
            $ref: '#/components/schemas/NotificationChannelPreference'
        digest: { $ref: '#/components/schemas/NotificationDigestPreferences' }

    NotificationPreferencesUpdate:
      type: object
      additionalProperties: false
      properties:
        preferences:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/NotificationChannelPreference'
        digest: { $ref: '#/components/schemas/NotificationDigestPreferences' }

    # ── FX & prices ───────────────────────────────────────────
    FxRate:
      type: object
      required: [base_currency, quote_currency, rate, as_of, source]
      properties:
        base_currency: { $ref: '#/components/schemas/Currency' }
        quote_currency: { $ref: '#/components/schemas/Currency' }
        rate:
          type: string
          pattern: '^-?[0-9]+(\.[0-9]{1,10})?$'
          description: How many `quote_currency` units one `base_currency` unit buys.
        as_of: { type: string, format: date }
        source: { type: string, examples: [ecb, openexchangerates] }

    FxRatesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/FxRate' }

    PriceEntry:
      type: object
      required: [symbol, asset_type, currency, price, as_of, source]
      properties:
        symbol: { type: string }
        asset_type: { $ref: '#/components/schemas/AssetType' }
        currency: { $ref: '#/components/schemas/Currency' }
        price: { $ref: '#/components/schemas/Money' }
        as_of: { type: string, format: date-time }
        source: { type: string, examples: [polygon, coingecko] }

    PricesResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/PriceEntry' }

    # ── Security (Clerk-proxied) ──────────────────────────────
    TwoFactorStatus:
      type: object
      required: [enabled]
      properties:
        enabled: { type: boolean }
        enrolled_at:
          type: [string, "null"]
          format: date-time
        backup_codes_remaining:
          type: [integer, "null"]
          minimum: 0

    TwoFactorEnrollment:
      type: object
      required: [secret, otpauth_url, backup_codes]
      properties:
        secret:
          type: string
          description: Base32 TOTP shared secret (manual-entry fallback).
        otpauth_url:
          type: string
          description: '`otpauth://` URL suitable for QR-code rendering.'
        backup_codes:
          type: array
          description: One-time backup codes shown once at enrolment.
          items: { type: string }

    TwoFactorVerifyRequest:
      type: object
      required: [code]
      additionalProperties: false
      properties:
        code:
          type: string
          pattern: '^[0-9]{6}$'

    TwoFactorBackupCodes:
      type: object
      required: [backup_codes]
      properties:
        backup_codes:
          type: array
          items: { type: string }

    UserSession:
      type: object
      required: [id, last_active_at, is_current]
      properties:
        id:
          type: string
          description: Clerk session id.
        device_label:
          type: [string, "null"]
          description: Best-effort device/browser label (e.g. "Chrome on macOS").
        browser:
          type: [string, "null"]
        os:
          type: [string, "null"]
        ip_address:
          type: [string, "null"]
          description: IPv4/IPv6 address as recorded by Clerk.
        city:
          type: [string, "null"]
          description: Best-effort geolocation from IP.
        last_active_at:
          type: string
          format: date-time
        is_current:
          type: boolean

    # ── Exports ───────────────────────────────────────────────
    ExportResource:
      type: string
      enum: [transactions, positions, snapshots, dividends]

    ExportCreateRequest:
      type: object
      required: [resource, format]
      additionalProperties: false
      properties:
        resource: { $ref: '#/components/schemas/ExportResource' }
        format:
          type: string
          enum: [csv]
        from:
          type: [string, "null"]
          format: date
        to:
          type: [string, "null"]
          format: date
        columns:
          type: array
          description: Optional column allow-list; if omitted, default set is exported.
          items: { type: string }

    ExportJob:
      type: object
      required: [id, resource, format, status, created_at]
      properties:
        id: { type: string, format: uuid }
        resource: { $ref: '#/components/schemas/ExportResource' }
        format: { type: string, enum: [csv] }
        status:
          type: string
          enum: [queued, running, done, failed]
        filters:
          type: object
          additionalProperties: true
        row_count:
          type: [integer, "null"]
          minimum: 0
        result_url:
          type: [string, "null"]
          format: uri
          description: Pre-signed URL; expires 24h after `completed_at`.
        error:
          type: [string, "null"]
        created_at: { type: string, format: date-time }
        completed_at:
          type: [string, "null"]
          format: date-time

    # ── Analytics (Pro) ───────────────────────────────────────
    PortfolioAnalytics:
      type: object
      required:
        - period
        - sharpe
        - sortino
        - max_drawdown
        - volatility
        - underwater_series
        - factor_exposure
        - style_box
        - correlation_matrix
      description: >
        factor_exposure, style_box and correlation_matrix are nullable
        until the factor-model / classification feeds land
        (TD-032/033). The X-Analytics-Partial response header signals
        when any of them are null so clients that need a hard fail
        can key on it.
      properties:
        period: { type: string, enum: [3m, 6m, 1y, 3y, all] }
        sharpe: { type: number, format: float }
        sortino: { type: number, format: float }
        max_drawdown:
          type: number
          format: float
          description: Negative signed fraction; -0.23 == -23%.
        volatility:
          type: number
          format: float
          description: Annualised stdev, unitless decimal.
        underwater_series:
          type: array
          items:
            type: object
            required: [date, drawdown_percent]
            properties:
              date: { type: string, format: date }
              drawdown_percent: { type: number, format: float }
        factor_exposure:
          oneOf:
            - type: object
              required: [value, growth, momentum, quality, size]
              properties:
                value: { type: number, format: float }
                growth: { type: number, format: float }
                momentum: { type: number, format: float }
                quality: { type: number, format: float }
                size: { type: number, format: float }
            - type: "null"
          description: >
            Null when the factor-model feed is unavailable (TD-032).
        style_box:
          oneOf:
            - type: array
              minItems: 3
              maxItems: 3
              description: |
                3×3 grid (growth/core/value × small/mid/large). Row-major:
                `[[small-growth, small-core, small-value], [mid-...], [large-...]]`.
                Values are fractions summing to ~1.0.
              items:
                type: array
                minItems: 3
                maxItems: 3
                items: { type: number, format: float }
            - type: "null"
          description: >
            Null when the style-classification feed is unavailable
            (TD-032).
        correlation_matrix:
          oneOf:
            - type: object
              required: [symbols, values]
              properties:
                symbols:
                  type: array
                  items: { type: string }
                values:
                  type: array
                  description: Square matrix, same ordering as `symbols`.
                  items:
                    type: array
                    items: { type: number, format: float }
            - type: "null"
          description: >
            Null when the per-symbol price series is too sparse to
            compute a reliable matrix (TD-033).

    # ── Tax (Pro) ─────────────────────────────────────────────
    TaxReport:
      type: object
      required:
        - jurisdiction
        - year
        - realized_gains
        - realized_losses
        - dividends_received
        - withholding_tax
        - estimated_taxable_income
        - transactions
      properties:
        jurisdiction: { type: string, enum: [US, DE, FR, UK, ES, NL] }
        year: { type: integer }
        realized_gains: { $ref: '#/components/schemas/Money' }
        realized_losses: { $ref: '#/components/schemas/Money' }
        dividends_received: { $ref: '#/components/schemas/Money' }
        withholding_tax:
          oneOf:
            - $ref: '#/components/schemas/Money'
            - type: "null"
          description: >
            Null when per-transaction withholding is not captured in
            the schema yet (TD-031). The X-Withholding-Unavailable
            response header signals the scope-cut to callers that
            need to fail closed.
        estimated_taxable_income: { $ref: '#/components/schemas/Money' }
        transactions:
          type: array
          items: { $ref: '#/components/schemas/TaxTransaction' }
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    TaxTransaction:
      type: object
      required: [transaction_id, executed_at, symbol, kind, amount, currency]
      properties:
        transaction_id: { type: string, format: uuid }
        executed_at: { type: string, format: date-time }
        symbol: { type: string }
        kind:
          type: string
          enum: [realized_gain, realized_loss, dividend, withholding, other]
          description: Classification relevant to the selected jurisdiction.
        amount: { $ref: '#/components/schemas/Money' }
        currency: { $ref: '#/components/schemas/Currency' }
        holding_period_days:
          type: [integer, "null"]
          minimum: 0
          description: Short-term vs long-term gain classification input.

    # ── Glossary ──────────────────────────────────────────────
    GlossaryTerm:
      type: object
      required: [slug, locale, title, short_def]
      properties:
        slug:
          type: string
          pattern: '^[a-z0-9-]+$'
        locale: { type: string, examples: [en, en-US] }
        title: { type: string }
        short_def:
          type: string
          description: One-sentence definition (tooltip copy).
        long_def:
          type: [string, "null"]
          description: Expanded paragraph; used by the chat Explainer callout.
        related_slugs:
          type: array
          items: { type: string, pattern: '^[a-z0-9-]+$' }
        updated_at: { type: string, format: date-time }
