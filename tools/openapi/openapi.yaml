        '200':
          description: Conversations
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/AIConversationSummary' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [AI]
      operationId: createAIConversation
      summary: Start a new conversation
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  maxLength: 200
                  description: Optional title; otherwise auto-generated from the first user message.
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AIConversation' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: AI Chat tier limit reached
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /ai/conversations/{id}:
    parameters:
      - $ref: '#/components/parameters/ConversationId'
    get:
      tags: [AI]
      operationId: getAIConversation
      summary: Get conversation with messages
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Conversation detail
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AIConversationDetail' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [AI]
      operationId: deleteAIConversation
      summary: Delete a conversation
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '204':
          description: Deleted
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /ai/chat:
    post:
      tags: [AI]
      operationId: sendAIChat
      summary: Send a chat message (non-streaming)
      description: |
        Sends a user message and returns the full assistant reply as a single
        JSON response. Mostly used for integration tests, retrospectives and
        deterministic server-side automations. Production clients should use
        `POST /ai/chat/stream` for the SSE variant.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AIChatRequest' }
      responses:
        '200':
          description: Assistant reply
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AIChatResponse' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: AI Chat tier limit reached
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /ai/chat/stream:
    post:
      tags: [AI]
      operationId: sendAIChatStream
      summary: Send a chat message (Server-Sent Events stream)
      description: |
        Sends a user message and streams the assistant reply back as
        Server-Sent Events. The HTTP response is `text/event-stream`.

        ## Event format

        Each event is encoded in the SSE wire format:

        ```text
        event: <event_type>
        data: <JSON payload>

        ```

        (A blank line terminates the event.) The JSON payload conforms to
        `AIChatStreamEvent` below — the `type` field equals `<event_type>`.

        ## Event types

        | `event`              | Meaning                                             |
        |----------------------|-----------------------------------------------------|
        | `message_start`      | Server acknowledged the request, streaming opening. |
        | `content_block_start`| A new content block begins.                         |
        | `content_delta`      | Incremental text for the current block.             |
        | `content_block_stop` | Current block finished.                             |
        | `tool_use`           | Assistant calls a tool (portfolio, quote, …).       |
        | `tool_result`        | Tool result payload sent back to the model.         |
        | `message_stop`       | Final message; includes token usage and message id. |
        | `error`              | Error occurred mid-stream.                          |

        Clients should treat any unknown event types as ignorable and keep
        reading until `message_stop` or `error`.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AIChatRequest' }
      responses:
        '200':
          description: SSE stream of AIChatStreamEvent payloads
          content:
            text/event-stream:
              schema: { $ref: '#/components/schemas/AIChatStreamEvent' }
        '400': { $ref: '#/components/responses/ValidationError' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: AI Chat tier limit reached
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /ai/insights:
    get:
      tags: [AI]
      operationId: listInsights
      summary: List active proactive insights
      parameters:
        - name: include_dismissed
          in: query
          schema: { type: boolean, default: false }
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Insights
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedEnvelope'
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Insight' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /ai/insights/generate:
    post:
      tags: [AI]
      operationId: generateInsight
      summary: Request an immediate insight generation run
      description: |
        Backs the `[Generate new ↻]` CTA on `/insights` (design brief §5.5).
        Returns `202` with the in-progress job — clients poll
        `/ai/insights?include_dismissed=false` or listen for the
        `insight_generated` notification to pick it up once created.

        Tier-gated: Free users may call once per week (cap enforced server-side,
        returns `429 TIER_LIMIT_EXCEEDED`). Plus: daily. Pro: unlimited.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                insight_type:
                  $ref: '#/components/schemas/InsightType'
                  description: Optional — hint to focus the run on a category.
      responses:
        '202':
          description: Generation queued
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InsightGenerationJob' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403':
          description: Tier feature-locked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '429': { $ref: '#/components/responses/RateLimited' }

  /ai/insights/{id}/dismiss:
    parameters:
      - $ref: '#/components/parameters/InsightId'
    post:
      tags: [AI]
      operationId: dismissInsight
      summary: Dismiss an insight
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      responses:
